<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#1e3a8a" stroke-width="0.2" opacity="0.5" />
    </pattern>
    <pattern id="grid-2" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#0ea5e9" stroke-width="0.5" opacity="0.8" />
    </pattern>
    <pattern id="neural" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#0ea5e9" opacity="0.7" />
      <circle cx="70" cy="40" r="1" fill="#2563eb" opacity="0.7" />
      <circle cx="30" cy="70" r="1" fill="#0ea5e9" opacity="0.7" />
      <circle cx="85" cy="75" r="1" fill="#2563eb" opacity="0.7" />
      <circle cx="50" cy="50" r="1.5" fill="#0ea5e9" opacity="0.8" />
      
      <line x1="20" y1="20" x2="50" y2="50" stroke="#0ea5e9" stroke-width="0.2" opacity="0.5" />
      <line x1="70" y1="40" x2="50" y2="50" stroke="#0ea5e9" stroke-width="0.2" opacity="0.5" />
      <line x1="30" y1="70" x2="50" y2="50" stroke="#0ea5e9" stroke-width="0.2" opacity="0.5" />
      <line x1="85" y1="75" x2="50" y2="50" stroke="#0ea5e9" stroke-width="0.2" opacity="0.5" />
    </pattern>
  </defs>
  
  <rect width="100" height="100" fill="url(#grid)" />
  <rect width="100" height="100" fill="url(#grid-2)" />
  <rect width="100" height="100" fill="url(#neural)" />
</svg> 