<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ajish Pradeep - AI Engineer & Researcher</title>
    <meta name="description"
        content="Ajish Pradeep - AI Engineer & Consultant specializing in Vision AI, Generative AI, and scalable AI solutions.">
    <meta name="author" content="Ajish Pradeep">
    <meta name="keywords"
        content="AI Engineer, Generative AI Consultant, Vision AI Expert, Machine Learning, Freelance AI Consultant">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind Configuration Override
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'tech-cyan': '#06b6d4',
                        'tech-green': '#10b981',
                        'tech-orange': '#f97316',
                        'tech-yellow': '#f59e0b'
                    },
                    spacing: {
                        '128': '32rem',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/profile_pic.png">
    <style>
        .loading-placeholder {
            background: rgba(17, 24, 39, 0.7);
            border: 1px dashed #374151;
            border-radius: 0.5rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }

        .loading-spinner {
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="text-gray-200 bg-black">
    <!-- Subtle AI Background -->
    <div class="ai-background fixed top-0 left-0 w-full h-full -z-10"></div>

    <!-- Include navigation component -->
    <div id="nav-container" class="sticky top-0 z-50 mb-6">
        <div class="loading-placeholder">
            <div class="loading-spinner"></div>
            <span>Loading navigation...</span>
        </div>
    </div>

    <div class="container mx-auto px-4 py-6 max-w-6xl">
        <!-- Main Dashboard -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-x-8 gap-y-6">
            <!-- Include sidebar component -->
            <div id="sidebar-container"
                class="lg:col-span-3 lg:sticky lg:top-24 lg:self-start lg:max-h-[calc(100vh-6rem)] lg:overflow-auto">
                <div class="loading-placeholder">
                    <div class="loading-spinner"></div>
                    <span>Loading sidebar...</span>
                </div>
            </div>

            <!-- Main Content -->
            <div class="lg:col-span-9 space-y-6">
                <!-- About Section -->
                <div id="about-container" class="section-container">
                    <div class="loading-placeholder">
                        <div class="loading-spinner"></div>
                        <span>Loading about section...</span>
                    </div>
                </div>

                <!-- Skills Section -->
                <div id="skills-container" class="section-container">
                    <div class="loading-placeholder">
                        <div class="loading-spinner"></div>
                        <span>Loading skills section...</span>
                    </div>
                </div>

                <!-- Services Section -->
                <div id="services-container" class="section-container">
                    <div class="loading-placeholder">
                        <div class="loading-spinner"></div>
                        <span>Loading services section...</span>
                    </div>
                </div>

                <!-- Experience & Terminal Section -->
                <div id="experience-container" class="section-container">
                    <div class="loading-placeholder">
                        <div class="loading-spinner"></div>
                        <span>Loading experience section...</span>
                    </div>
                </div>

                <!-- Education Section -->
                <div id="education-container" class="section-container">
                    <div class="loading-placeholder">
                        <div class="loading-spinner"></div>
                        <span>Loading education section...</span>
                    </div>
                </div>

                <!-- Portfolio Section -->
                <div id="portfolio-container" class="section-container">
                    <div class="loading-placeholder">
                        <div class="loading-spinner"></div>
                        <span>Loading portfolio section...</span>
                    </div>
                </div>

                <!-- Collaborations Section -->
                <div id="collaborations-container" class="section-container">
                    <div class="loading-placeholder">
                        <div class="loading-spinner"></div>
                        <span>Loading collaborations section...</span>
                    </div>
                </div>

                <!-- Contact Section -->
                <div id="contact-container" class="section-container">
                    <div class="loading-placeholder">
                        <div class="loading-spinner"></div>
                        <span>Loading contact section...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Include footer component -->
        <div id="footer-container" class="mt-12 pt-6 border-t border-gray-800">
            <div class="loading-placeholder">
                <div class="loading-spinner"></div>
                <span>Loading footer...</span>
            </div>
        </div>
    </div>

    <!-- Back to top button -->
    <button id="back-to-top"
        class="fixed right-6 bottom-24 md:bottom-6 bg-gray-800 hover:bg-gray-700 w-10 h-10 rounded-full flex items-center justify-center shadow-lg z-50 opacity-0 transition-all duration-300">
        <i class="fas fa-arrow-up text-cyan-400"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/main.js" type="module"></script>

    <!-- Fallback for browsers that don't support ES modules -->
    <script nomodule>
        document.body.innerHTML = `
            <div style="max-width: 600px; margin: 100px auto; padding: 20px; text-align: center; background: #1a1a1a; border-radius: 8px;">
                <h1 style="color: #f59e0b;">Browser Compatibility Issue</h1>
                <p>Your browser doesn't support ES modules which are required for this website.</p>
                <p>Please use a modern browser like Chrome, Firefox, Safari, or Edge.</p>
            </div>
        `;
    </script>
</body>

</html>
